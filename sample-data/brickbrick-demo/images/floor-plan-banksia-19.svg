<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-label="Banksia 19 floor plan">
  <rect width="720" height="480" fill="#f8fafc"/>
  <rect x="26" y="26" width="668" height="428" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="48" y="62" font-family="Inter, Arial, sans-serif" font-size="24" fill="#1e293b">Banksia 19 floor plan</text>
  <text x="50" y="86" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">178 sqm - 11.2m x 19.4m - min lot 14m x 27m</text>
  <g transform="translate(50 120)">
    <text x="0" y="-18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">Single storey</text>
    <rect x="0" y="0" width="118" height="84" fill="#eef2f7" stroke="#334155" stroke-width="2"/><text x="8" y="22" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Garage</text>
    <rect x="118" y="0" width="88" height="84" fill="#ffffff" stroke="#334155" stroke-width="2"/><text x="126" y="22" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Entry</text>
    <rect x="206" y="0" width="112" height="84" fill="#f8fafc" stroke="#334155" stroke-width="2"/><text x="214" y="22" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Bed 2</text>
    <rect x="0" y="84" width="104" height="82" fill="#f8fafc" stroke="#334155" stroke-width="2"/><text x="8" y="106" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Bed 3</text>
    <rect x="104" y="84" width="100" height="82" fill="#eef6f8" stroke="#334155" stroke-width="2"/><text x="112" y="106" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Bath</text>
    <rect x="204" y="84" width="114" height="82" fill="#f8fafc" stroke="#334155" stroke-width="2"/><text x="212" y="106" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Bed 4</text>
    <rect x="0" y="166" width="136" height="118" fill="#fff7ed" stroke="#334155" stroke-width="2"/><text x="8" y="188" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Kitchen</text>
    <rect x="136" y="166" width="182" height="118" fill="#f5f7ec" stroke="#334155" stroke-width="2"/><text x="144" y="188" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Living / Dining</text>
    <rect x="64" y="284" width="254" height="58" fill="#edf7ed" stroke="#334155" stroke-width="2"/><text x="72" y="306" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Alfresco</text>
    <path d="M136 225 H318" stroke="#9bbf7a" stroke-width="5" stroke-linecap="round"/>
    <path d="M206 42 H246" stroke="#2d5a88" stroke-width="4" stroke-linecap="round"/>
